# main 브랜치에 push 시 LightSail에 자동 배포
name: Deploy to LightSail

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/wedding-invitation
            git fetch --all
            git reset --hard origin/main
            npm ci
            npm run build

            pm2 describe wedding-invitation >/dev/null \
              && pm2 reload wedding-invitation --update-env \
              || pm2 start ecosystem.config.js --only wedding-invitation

            pm2 save
